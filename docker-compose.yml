services:
  minio:
    image: minio/minio:latest
    container_name: vkr-ml-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - 9001:9000  # API порт
      - 8083:9001  # Console порт - 
    volumes:
      - minio_data:/data
      - ./scripts/minio-setup.sh:/etc/minio-setup.sh
    networks:
      - ml_network # В остальном пусть не мешает
      - vkr-outer-network # открываем доступ вовне для console

  redis:
    image: redis:7-alpine
    container_name: vkr-ml-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
    command: ["/bin/sh",  "-c",  "redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass \"$${REDIS_PASSWORD:-redis123}\""]
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    networks:
      - vkr-outer-network
      - ml_network
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$${REDIS_PASSWORD:-redis123}\" redis-cli ping | grep -q '^PONG$'"]
      interval: 10s
      timeout: 3s
      retries: 3

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: vkr-ml-redis-commander
    environment:
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
      - REDIS_PORT=6379
      - REDIS_DB=0
    ports:
      - 8082:8081
    depends_on:
      - redis
    networks:
      - ml_network
      - vkr-outer-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: vkr-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ml_network
      - vkr-outer-network
    deploy:
      resources:
        limits:
          cpus: 4
          memory: 8G

  ml-console:
    build: 
      context: .
      dockerfile: ./Dockerfile
    container_name: vkr-ml-console
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - ml_network
      - vkr-inner-network
      - vkr-outer-network
    environment:
      - PYTHONPATH=/app/src
      - PYTHONUNBUFFERED=1
    volumes:
      - ./:/app
    stdin_open: true
    tty: true
    command: ["/bin/bash", "-c", "/app/scripts/update-venv.sh && exec /bin/bash"]
    ports:
      - 8000:8000  # FastAPI порт

volumes:
  redis_data:
    name: "vkr-volume-redis"
  minio_data:
    name: "vkr-volume-minio" 
  qdrant_data:
    name: "vkr-volume-qdrant"


networks:
  ml_network: # Локальная сеть для данного контейнера
    name: vkr-scinside-ml-network
    driver: bridge
    internal: true
    external: false
  vkr-inner-network:
    name: vkr-scinside-internal
    driver: bridge
    internal: true
    external: true
  vkr-outer-network:
    name: vkr-scinside-external
    driver: bridge
    internal: false
    external: true
