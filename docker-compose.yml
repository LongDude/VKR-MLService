services:
  redis:
    image: redis:7-alpine
    container_name: vkr-ml-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
    command: ["/bin/sh", "-c", "redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass \"$${REDIS_PASSWORD:-redis123}\""]
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    networks:
      - vkr-outer-network
      - ml_network
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$${REDIS_PASSWORD:-redis123}\" redis-cli ping | grep -q '^PONG$'"]
      interval: 10s
      timeout: 3s
      retries: 3
    profiles:
      - worker
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 2G

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: vkr-ml-redis-commander
    environment:
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
      - REDIS_PORT=6379
      - REDIS_DB=0
    ports:
      - 8082:8081
    depends_on:
      - redis
    networks:
      - ml_network
      - vkr-outer-network
    profiles:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1G

  qdrant:
    image: qdrant/qdrant:latest
    container_name: vkr-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ml_network
      - vkr-outer-network
    deploy:
      resources:
        limits:
          cpus: 4
          memory: 8G

  vkr-ml-api:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: vkr-ml-api
    restart: unless-stopped
    networks:
      - ml_network
      - vkr-inner-network
    environment:
      - PYTHONPATH=/app/src
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-gresP0st}@vkr-database:5432/${POSTGRES_DB:-vkr-db}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
    volumes:
      - ./:/app
    ports:
      - 8000:8000
    deploy:
      resources:
        limits:
          cpus: 2
          memory: 2G

  vkr-ml-worker:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: vkr-ml-worker
    restart: unless-stopped
    command: ["python", "-m", "cli.worker", "run", "--no-progress", "--event-redis"]
    networks:
      - ml_network
      - vkr-inner-network
      - vkr-outer-network
    environment:
      - PYTHONPATH=/app/src
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-gresP0st}@vkr-database:5432/${POSTGRES_DB:-vkr-db}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - LMSTUDIO_BASE_URL=http://host.docker.internal:1234
    volumes:
      - ./:/app
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    profiles:
      - worker
    deploy:
      resources:
        limits:
          cpus: 4
          memory: 8G


volumes:
  redis_data:
    name: "vkr-volume-redis"
  qdrant_data:
    name: "vkr-volume-qdrant"

networks:
  ml_network:
    name: vkr-scinside-ml-network
    driver: bridge
    internal: true
    external: false
  vkr-inner-network:
    name: vkr-scinside-internal
    driver: bridge
    internal: true
    external: true
  vkr-outer-network:
    name: vkr-scinside-external
    driver: bridge
    internal: false
    external: true
